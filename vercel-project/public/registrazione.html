<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Registra Utente — Admin</title>
  <style>
    :root{
      --primary:#0047a8;--accent:#1c7ed6;
      --grad:linear-gradient(135deg,#0047a8 0%,#1c7ed6 100%);
      --bg:linear-gradient(160deg,#dde8f8 0%,#edf1f7 50%,#e8eef8 100%);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
    header{background:var(--grad);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,71,168,0.2);}
    header h1{color:#fff;font-size:1.1em;font-weight:800;}
    header a{color:#fff;text-decoration:none;font-weight:700;font-size:0.88em;background:rgba(255,255,255,0.18);padding:6px 14px;border-radius:8px;transition:background .2s;}
    header a:hover{background:rgba(255,255,255,0.28);}
    .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
    .card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,71,168,0.1);}
    .card h2{font-size:1.1em;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px;}
    .field{margin-bottom:18px;}
    label{display:block;font-size:0.77em;font-weight:800;text-transform:uppercase;color:#555;margin-bottom:5px;}
    input{width:100%;padding:11px 14px;border:1.5px solid #ccd6e8;border-radius:9px;font-size:0.95em;font-weight:600;color:#1a2540;background:#f5f8ff;outline:none;transition:border-color .18s,box-shadow .18s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(28,126,214,0.13);}
    .btn{width:100%;padding:13px;background:var(--grad);color:#fff;border:none;border-radius:10px;font-size:1em;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,71,168,0.22);transition:filter .18s,transform .12s;margin-top:4px;}
    .btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}
    .msg{border-radius:8px;padding:10px 14px;font-size:0.9em;font-weight:700;margin-bottom:16px;display:none;text-align:center;}
    .msg.error{background:#fff0f0;border:1.5px solid #f5c0c0;color:#c0392b;}
    .msg.success{background:#f0fff6;border:1.5px solid #a8e6c1;color:#1a7a45;}
    .msg.show{display:block;}
    .users-section{margin-top:32px;}
    .users-section h3{font-size:0.88em;font-weight:800;text-transform:uppercase;color:#555;margin-bottom:12px;letter-spacing:.03em;}
    .user-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;background:#f5f8ff;margin-bottom:6px;border:1px solid #e0e8f4;}
    .user-info .name{font-weight:700;font-size:0.9em;color:#1a2540;}
    .user-info .email{font-size:0.8em;color:#777;}
    .badge-role{font-size:0.75em;font-weight:800;padding:2px 10px;border-radius:20px;}
    .badge-admin{background:#e8f0ff;color:#0047a8;}
    .badge-user{background:#e8f5ee;color:#1a7a45;}
    .btn-del{background:none;border:1.5px solid #f5c0c0;color:#c0392b;border-radius:6px;padding:3px 10px;font-size:0.78em;font-weight:700;cursor:pointer;transition:background .18s,color .18s;}
    .btn-del:hover{background:#c0392b;color:#fff;}
  </style>
</head>
<body>
<header>
  <h1>👤 Registra Nuovo Utente</h1>
  <a href="/storico">← Torna allo Storico</a>
</header>
<div class="wrap">
  <div class="card">
    <h2>➕ Crea Account Operatore</h2>
    <div class="msg error" id="errMsg"></div>
    <div class="msg success" id="okMsg"></div>
    <form id="regForm" onsubmit="doRegister(event)">
      <div class="field">
        <label for="nome">Nome e Cognome</label>
        <input type="text" id="nome" placeholder="es. Mario Rossi"/>
      </div>
      <div class="field">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="email operatore" required/>
      </div>
      <div class="field">
        <label for="password">Password *</label>
        <input type="password" id="password" placeholder="minimo 6 caratteri" required minlength="6"/>
      </div>
      <div class="field">
        <label for="password2">Conferma Password *</label>
        <input type="password" id="password2" placeholder="ripeti la password" required/>
      </div>
      <button type="submit" class="btn" id="btnReg">Registra Utente</button>
    </form>

    <div class="users-section">
      <h3>Utenti registrati</h3>
      <div id="usersList">Caricamento...</div>
    </div>
  </div>
</div>

<script>
  function getAuth(){
    const token = localStorage.getItem('gv_auth_token');
    const role = localStorage.getItem('gv_user_role');
    if(!token || role !== 'admin'){ window.location.replace('/login'); return null; }
    return token;
  }

  const token = getAuth();
  if(token) loadUsers();

  async function doRegister(e){
    e.preventDefault();
    const errMsg = document.getElementById('errMsg');
    const okMsg = document.getElementById('okMsg');
    const btn = document.getElementById('btnReg');
    errMsg.classList.remove('show'); okMsg.classList.remove('show');

    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if(password !== password2){
      errMsg.textContent = '❌ Le password non coincidono.';
      errMsg.classList.add('show'); return;
    }

    btn.textContent = 'Registrazione...'; btn.disabled = true;
    try{
      const res = await fetch('/api/register',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({email,password,nome})
      });
      const data = await res.json();
      if(data.success){
        okMsg.textContent = '✅ Utente registrato con successo!';
        okMsg.classList.add('show');
        document.getElementById('regForm').reset();
        loadUsers();
      } else {
        errMsg.textContent = '❌ ' + (data.error || 'Errore nella registrazione');
        errMsg.classList.add('show');
      }
    } catch(err){
      errMsg.textContent = '❌ Errore di rete.';
      errMsg.classList.add('show');
    }
    btn.textContent = 'Registra Utente'; btn.disabled = false;
  }

  async function loadUsers(){
    const list = document.getElementById('usersList');
    try{
      const res = await fetch('/api/get-users',{headers:{'Authorization':'Bearer '+token}});
      const data = await res.json();
      if(!data.users || data.users.length === 0){ list.innerHTML = '<p style="color:#999;font-size:.88em">Nessun utente trovato.</p>'; return; }
      list.innerHTML = data.users.map(u=>`
        <div class="user-row">
          <div class="user-info">
            <div class="name">${u.nome || '—'}</div>
            <div class="email">${u.email}</div>
          </div>
          <span class="badge-role badge-${u.role}">${u.role === 'admin' ? '👑 Admin' : '👤 Utente'}</span>
        </div>
      `).join('');
    } catch(e){
      list.innerHTML = '<p style="color:#c0392b;font-size:.88em">Errore caricamento utenti.</p>';
    }
  }
</script>
</body>
</html>
