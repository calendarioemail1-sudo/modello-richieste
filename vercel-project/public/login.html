<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Accesso — Agenzia Giordano & Valenzise</title>
  <style>
    :root{
      --primary:#0047a8;--accent:#1c7ed6;
      --grad:linear-gradient(135deg,#0047a8 0%,#1c7ed6 100%);
      --bg:linear-gradient(160deg,#dde8f8 0%,#edf1f7 50%,#e8eef8 100%);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:#fff;border-radius:16px;padding:44px 38px 38px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,71,168,0.13),0 2px 8px rgba(0,0,0,0.06);border:1px solid rgba(28,126,214,0.1);}
    .logo{text-align:center;margin-bottom:30px;}
    .logo-icon{font-size:2.4em;margin-bottom:8px;}
    .logo h1{font-size:1.2em;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;}
    .logo p{font-size:0.82em;color:#888;margin-top:5px;font-weight:600;}
    .sep{height:2px;background:var(--grad);border-radius:2px;margin-bottom:28px;opacity:0.18;}
    label{display:block;font-size:0.77em;font-weight:800;text-transform:uppercase;color:#555;margin-bottom:5px;letter-spacing:.03em;}
    .field{margin-bottom:18px;}
    input{width:100%;padding:11px 14px;border:1.5px solid #ccd6e8;border-radius:9px;font-size:0.95em;font-weight:600;color:#1a2540;background:#f5f8ff;outline:none;transition:border-color .18s,box-shadow .18s,transform .12s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(28,126,214,0.13);transform:translateY(-1px);}
    .btn{width:100%;padding:13px;background:var(--grad);color:#fff;border:none;border-radius:10px;font-size:1em;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,71,168,0.22);transition:filter .18s,transform .12s;margin-top:4px;}
    .btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}
    .error{background:#fff0f0;border:1.5px solid #f5c0c0;color:#c0392b;border-radius:8px;padding:10px 14px;font-size:0.88em;font-weight:700;margin-bottom:16px;display:none;text-align:center;}
    .error.show{display:block;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>Agenzia Giordano & Valenzise</h1>
    <p>Accedi per continuare</p>
  </div>
  <div class="sep"></div>
  <div class="error" id="errMsg">❌ Email o password non corretti.</div>
  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="la tua email" required autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="la tua password" required autocomplete="current-password"/>
    </div>
    <button type="submit" class="btn" id="btnLogin">Accedi</button>
  </form>
</div>
<script>
  // Se già loggato, vai subito al form
  if(localStorage.getItem('gv_auth_token') && localStorage.getItem('gv_user_role')){
    window.location.replace('/');
  }

  async function doLogin(e){
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const errMsg = document.getElementById('errMsg');
    errMsg.classList.remove('show');
    btn.textContent = 'Accesso in corso...';
    btn.disabled = true;

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try{
      const res = await fetch('/api/auth',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password})
      });
      const data = await res.json();
      if(data.success && data.token){
        localStorage.setItem('gv_auth_token', data.token);
        localStorage.setItem('gv_user_email', data.email);
        localStorage.setItem('gv_user_role', data.role);
        localStorage.setItem('gv_user_nome', data.nome || data.email);
        window.location.replace('/');
      } else {
        errMsg.classList.add('show');
        btn.textContent = 'Accedi';
        btn.disabled = false;
      }
    } catch(err){
      errMsg.textContent = '❌ Errore di rete. Riprova.';
      errMsg.classList.add('show');
      btn.textContent = 'Accedi';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
